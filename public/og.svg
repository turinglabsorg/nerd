<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1a0f"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#0d2a0d" stroke-width="0.5"/>
    </pattern>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="transparent"/>
      <rect y="2" width="4" height="2" fill="#00000022"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Large UFO -->
  <g transform="translate(600, 200)">
    <!-- Beam -->
    <path d="M-60 40 L-120 280 L120 280 L60 40" fill="#00ff4108" stroke="#00ff4122" stroke-width="1"/>
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="140" ry="35" fill="none" stroke="#00ff41" stroke-width="2" opacity="0.8"/>
    <path d="M-90 0 Q-50 -60 0 -70 Q50 -60 90 0" fill="none" stroke="#00ff41" stroke-width="2" opacity="0.8"/>
    <!-- Dome -->
    <path d="M-40 -50 Q0 -85 40 -50" fill="none" stroke="#00ff4166" stroke-width="1.5"/>
    <!-- Lights -->
    <circle cx="-80" cy="0" r="5" fill="#00ff41" opacity="0.9"/>
    <circle cx="-40" cy="0" r="5" fill="#ffb000" opacity="0.9"/>
    <circle cx="0" cy="0" r="5" fill="#00ff41" opacity="0.9"/>
    <circle cx="40" cy="0" r="5" fill="#ffb000" opacity="0.9"/>
    <circle cx="80" cy="0" r="5" fill="#00ff41" opacity="0.9"/>
    <!-- Glow rings -->
    <circle cx="-80" cy="0" r="12" fill="none" stroke="#00ff4133" stroke-width="1"/>
    <circle cx="0" cy="0" r="12" fill="none" stroke="#00ff4133" stroke-width="1"/>
    <circle cx="80" cy="0" r="12" fill="none" stroke="#00ff4133" stroke-width="1"/>
  </g>

  <!-- Stars -->
  <circle cx="100" cy="80" r="1.5" fill="#00ff4166"/>
  <circle cx="250" cy="120" r="1" fill="#00ff4144"/>
  <circle cx="400" cy="50" r="1.5" fill="#00ff4155"/>
  <circle cx="550" cy="90" r="1" fill="#ffb00044"/>
  <circle cx="750" cy="60" r="1.5" fill="#00ff4166"/>
  <circle cx="900" cy="100" r="1" fill="#00ff4144"/>
  <circle cx="1050" cy="70" r="1.5" fill="#00ff4155"/>
  <circle cx="1100" cy="140" r="1" fill="#ffb00044"/>
  <circle cx="150" cy="160" r="1" fill="#00ff4133"/>
  <circle cx="1000" cy="170" r="1" fill="#00ff4133"/>
  <circle cx="350" cy="140" r="1.5" fill="#00ff4144"/>
  <circle cx="850" cy="130" r="1" fill="#00ff4155"/>

  <!-- Title -->
  <text x="600" y="440" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="72" font-weight="700" fill="#00ff41" letter-spacing="8">NERD</text>

  <!-- Subtitle -->
  <text x="600" y="485" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="18" fill="#007a20" letter-spacing="4">NEURAL EVALUATION OF REDDIT DATA</text>

  <!-- Tagline -->
  <text x="600" y="530" text-anchor="middle" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="14" fill="#004d15" letter-spacing="2">Scraping UFO subreddits // Evaluating authenticity with AI</text>

  <!-- Border -->
  <rect x="20" y="20" width="1160" height="590" rx="4" fill="none" stroke="#1a3a1a" stroke-width="1"/>

  <!-- Corner markers -->
  <path d="M20 50 L20 20 L50 20" fill="none" stroke="#00ff4166" stroke-width="2"/>
  <path d="M1150 20 L1180 20 L1180 50" fill="none" stroke="#00ff4166" stroke-width="2"/>
  <path d="M1180 580 L1180 610 L1150 610" fill="none" stroke="#00ff4166" stroke-width="2"/>
  <path d="M50 610 L20 610 L20 580" fill="none" stroke="#00ff4166" stroke-width="2"/>

  <!-- Status bar -->
  <text x="40" y="600" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10" fill="#003d10">STATUS: ONLINE // MONITORING: r/UFOs r/UFOB r/AliensRHere</text>
  <text x="1160" y="600" text-anchor="end" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10" fill="#003d10">v1.0</text>

  <!-- Scanline overlay -->
  <rect width="1200" height="630" fill="url(#scanlines)" opacity="0.3"/>
</svg>
